<div class="home-container">
  <h4 nz-typography class="home-title">Mensagens agendadas</h4>
  <nz-tabset nzType="card">
    <nz-tab *ngFor="let config of appointmentsConfig" [nzTitle]="config.title" (nzSelect)="config.onclick()">
      <nz-list nzItemLayout="horizontal" [nzLoading]="loading">
        <nz-list-item *ngFor="let appointment of appointments">
          <nz-list-item-meta 
            nzDescription="{{appointment.firstName}} {{appointment.lastName}}, {{appointment.address}} - {{appointment.appointmentDate | date: 'd/MM/YYYY'}}"
          >
            <nz-list-item-meta-title>{{appointment.phoneNumber}}</nz-list-item-meta-title>
          </nz-list-item-meta>
          <nz-tag nzColor="{{appointment.status | status_to_color}}">{{appointment.status}}</nz-tag>
        </nz-list-item>
      </nz-list>
    </nz-tab>
  </nz-tabset>
</div>
